<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DND Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 100vh;
      background: #000;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script>
// размеры твоей карты (пока оставим так)
var width = 2000;
var height = 1200;

// создаём карту
var map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2
});

// загружаем картинку
var imageUrl = 'map.jpg';

var bounds = [[0,0], [height, width]];
L.imageOverlay(imageUrl, bounds).addTo(map);

map.fitBounds(bounds);

// пример маркера
L.marker([600, 1000]).addTo(map)
  .bindPopup("Пример города")
  .openPopup();

</script>

</body>
</html>
