<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DND Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
 body {
  margin: 0;
  background: url('background.jpg') no-repeat center center fixed;
  background-size: cover;
}

#map {
  height: 90vh;
  width: 90vw;
  margin: 5vh auto;

  background: transparent;

  box-shadow: 0 0 25px rgba(0,0,0,0.6);

  position: relative;
}

#map::after {
  content: "";
  position: absolute;

  top: 8%;
  left: 2%;
  right: 2%;
  bottom: 8%;

  border: 4px solid #0f0b07;

  box-shadow: 
    0 0 40px rgba(0,0,0,0.9),
    inset 0 0 20px rgba(0,0,0,0.5);

  pointer-events: none;
}
  .leaflet-container {
  outline: none !important;
  border: none !important;
}

.leaflet-pane img {
  border: none !important;
}
  </style>
</head>

<body>
<div id="map"></div>

<script>
// размеры твоей карты (пока оставим так)
var width = 7016;
var height = 4960;

// создаём карту
var bounds = [[0,0], [height, width]];

var map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 0,
  maxBounds: bounds,
  maxBoundsViscosity: 1.0
});

// загружаем картинку
var imageUrl = 'map.jpg';

var bounds = [[0,0], [height, width]];
var overlay = L.imageOverlay(imageUrl, bounds).addTo(map);

map.fitBounds(bounds);

if (map.getZoom() === map.getMinZoom()) {
  map.dragging.disable();
}

map.on('zoomend', function() {
  if (map.getZoom() === map.getMinZoom()) {
    map.dragging.disable();
  } else {
    map.dragging.enable();
  }
});

</script>

</body>
</html>
