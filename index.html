<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DND Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
 body {
  margin: 0;
  background: url('background.jpg') no-repeat center center fixed;
  background-size: cover;
}

#map {
  height: 100%;
  width: 100%;

  background: transparent;
  position: relative;
}

#map-wrapper::after {
  content: "";
  position: absolute;

  top: -2%;
  bottom: -2%;
  left: 11%;
  right: 11%;

  border: 4px solid #0f0b07;

  box-shadow: 
    0 0 40px rgba(0,0,0,0.9),
    inset 0 0 20px rgba(0,0,0,0.5);

  pointer-events: none;
}
  .leaflet-container {
  outline: none !important;
  border: none !important;
}

.leaflet-pane img {
  border: none !important;
}

#map-wrapper {
  height: 90vh;
  width: 90vw;
  margin: 5vh auto;

  position: relative;
}

#map.zoomed::after {
  content: "";
  position: absolute;

  top: 0;
  left: 0;
  right: 0;
  bottom: 0;

  border: 4px solid #0f0b07;

  box-shadow: 
    0 0 40px rgba(0,0,0,0.9),
    inset 0 0 20px rgba(0,0,0,0.5);

  pointer-events: none;
}

#map-wrapper.zoomed::after {
  display: none;
}

  </style>
</head>

<body>
<div id="map-wrapper">
  <div id="map"></div>
</div>

<script>
// размеры твоей карты (пока оставим так)
var width = 7016;
var height = 4960;

// создаём карту
var bounds = [[0,0], [height, width]];

var map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2.2,
  maxZoom: 0,
  maxBounds: bounds,
  maxBoundsViscosity: 1.0,
  attributionControl: false
});

// загружаем картинку
var imageUrl = 'map.jpg';

var bounds = [[0,0], [height, width]];
var overlay = L.imageOverlay(imageUrl, bounds).addTo(map);

map.fitBounds(bounds);

function updateFrame() {
  var mapEl = document.getElementById('map');
  var wrapper = document.getElementById('map-wrapper');

  if (map.getZoom() === map.getMinZoom()) {
    // минимальный зум
    wrapper.classList.remove("zoomed");
    mapEl.classList.remove("zoomed");

    map.dragging.disable(); // ← блокируем
  } else {
    // зум есть
    wrapper.classList.add("zoomed");
    mapEl.classList.add("zoomed");

    map.dragging.enable(); // ← ВОТ ЭТО ВАЖНО
  }
}

updateFrame();
map.on('zoomend', updateFrame);

// --- ЗАГРУЗКА СОХРАНЁННЫХ МЕТОК ---
var savedMarkers = JSON.parse(localStorage.getItem("markers") || "[]");

savedMarkers.forEach(function(m) {
  addMarker(m);
});

function addMarker(data) {
  var marker = L.marker([data.lat, data.lng]).addTo(map);

  function renderPopup() {
    return `
      <div style="min-width:200px">
        <h3>${data.title}</h3>
        <p>${data.description}</p>

        <button onclick="editMarker(${data.id})">✏️ Изменить</button>
        <button onclick="deleteMarker(${data.id})">🗑 Удалить</button>
      </div>
    `;
  }

  marker.bindPopup(renderPopup());

  marker._customId = data.id;
}

// --- ДОБАВЛЕНИЕ МЕТКИ ПО КЛИКУ ---
map.on('click', function(e) {
  var title = prompt("Название метки:");
  if (!title) return;

  var description = prompt("Описание:");
  if (!description) return;

  var markerData = {
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    title: title,
    description: description,
    id: Date.now()
  };

  addMarker(markerData);

  savedMarkers.push(markerData);
  localStorage.setItem("markers", JSON.stringify(savedMarkers));
});

function deleteMarker(id) {
  var confirmDelete = confirm("Удалить метку?");

  if (!confirmDelete) return;

  savedMarkers = savedMarkers.filter(m => m.id !== id);
  localStorage.setItem("markers", JSON.stringify(savedMarkers));

  location.reload(); // обновляем карту
}

function editMarker(id) {
  var marker = savedMarkers.find(m => m.id === id);
  if (!marker) return;

  var newTitle = prompt("Новое название:", marker.title);
  if (!newTitle) return;

  var newDesc = prompt("Новое описание:", marker.description);
  if (!newDesc) return;

  marker.title = newTitle;
  marker.description = newDesc;

  localStorage.setItem("markers", JSON.stringify(savedMarkers));

  location.reload();
}

</script>

</body>
</html>
