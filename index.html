<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DND Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
body {
  margin: 0;
  height: 100vh;

  background: url('background.jpg') no-repeat center center fixed;
  background-size: cover;

  display: flex;
  align-items: center;
  justify-content: center;
}

#map {
  height: 100%;
  width: 100%;

  background: transparent;
  position: relative;
}

#map-wrapper::after {
  content: "";
  position: absolute;

  top: 120px;
  bottom: 120px;
  left: 11%;
  right: 11%;

  border: 4px solid #0f0b07;

  box-shadow: 
    0 0 40px rgba(0,0,0,0.9),
    inset 0 0 20px rgba(0,0,0,0.5);

  pointer-events: none;
}
  .leaflet-container {
  outline: none !important;
  border: none !important;
}

.leaflet-pane img {
  border: none !important;
}

#map-wrapper {
  width: 90vw;
  aspect-ratio: 7016 / 4960;

  margin: 0 auto;

  position: relative;
}

#map.zoomed::after {
  content: "";
  position: absolute;

  top: 0;
  left: 0;
  right: 0;
  bottom: 0;

  border: 4px solid #0f0b07;

  box-shadow: 
    0 0 40px rgba(0,0,0,0.9),
    inset 0 0 20px rgba(0,0,0,0.5);

  pointer-events: none;
}

#map-wrapper.zoomed::after {
  display: none;
}

.marker-popup {
  background: #1b1b1b;
  color: #f5f5f5;
  padding: 10px;
  border-radius: 8px;
  font-family: sans-serif;
  min-width: 200px;
}

.marker-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 5px;
}

.marker-desc {
  font-size: 13px;
  opacity: 0.8;
  margin-bottom: 10px;
}

.marker-buttons {
  display: flex;
  justify-content: space-between;
}

.marker-buttons button {
  background: #333;
  border: none;
  color: white;
  padding: 5px 8px;
  border-radius: 4px;
  cursor: pointer;
}

.marker-buttons button:hover {
  background: #555;
}

  </style>
</head>

<body>

<div id="marker-form" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
background:#1e1e1e; padding:20px; border-radius:8px; z-index:1000; color:white; width:300px;">

  <h3 id="form-title">Новая метка</h3>

  <input id="marker-title" placeholder="Название" style="width:100%; margin-bottom:10px;" />
  
  <textarea id="marker-desc" placeholder="Описание" style="width:100%; height:80px;"></textarea>

  <div style="margin-top:10px; display:flex; justify-content:space-between;">
    <button onclick="saveMarker()">Сохранить</button>
    <button onclick="closeForm()">Отмена</button>
  </div>
</div>

<div id="map-wrapper">
  <div id="map"></div>
</div>

<script>

var currentLatLng = null;
var editId = null;
var popupJustClosed = false;

// размеры твоей карты (пока оставим так)
var width = 7016;
var height = 4960;

// создаём карту
var bounds = [[0,0], [height, width]];

var map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 0,
  maxBounds: bounds,
  maxBoundsViscosity: 1.0,
  attributionControl: false,
});

// загружаем картинку
var imageUrl = 'map.jpg';

var bounds = [[0,0], [height, width]];
var overlay = L.imageOverlay(imageUrl, bounds).addTo(map);

map.fitBounds(bounds, {
  padding: [0, 0],
  animate: false
});

map.setMaxBounds(bounds);
map.panInsideBounds(bounds, { animate: false });

map.on('popupclose', function() {
  popupJustClosed = true;

  setTimeout(function() {
    popupJustClosed = false;
  }, 100);
});

function updateFrame() {
  var mapEl = document.getElementById('map');
  var wrapper = document.getElementById('map-wrapper');

  if (map.getZoom() === map.getMinZoom()) {
    // минимальный зум
    wrapper.classList.remove("zoomed");
    mapEl.classList.remove("zoomed");

    map.dragging.disable(); // ← блокируем

  } else {
    // зум есть
    wrapper.classList.add("zoomed");
    mapEl.classList.add("zoomed");

    map.dragging.enable(); // ← ВОТ ЭТО ВАЖНО
  }
}

updateFrame();
map.on('zoomend', updateFrame);

// --- ЗАГРУЗКА СОХРАНЁННЫХ МЕТОК ---
var savedMarkers = JSON.parse(localStorage.getItem("markers") || "[]");

savedMarkers.forEach(function(m) {
  addMarker(m);
});

function addMarker(data) {
  var marker = L.marker([data.lat, data.lng]).addTo(map);

function renderPopup() {
  return `
    <div class="marker-popup">
      <div class="marker-title">${data.title}</div>
      <div class="marker-desc">${data.description}</div>

      <div class="marker-buttons">
        <button onclick="editMarker(${data.id})">✏️</button>
        <button onclick="deleteMarker(${data.id})">🗑</button>
      </div>
    </div>
  `;
}

  marker.bindPopup(renderPopup());

  marker._customId = data.id;
}

// --- ДОБАВЛЕНИЕ МЕТКИ ПО КЛИКУ ---
map.on('click', function(e) {
  if (popupJustClosed) return; // ← ВОТ ЭТО ГЛАВНОЕ

  currentLatLng = e.latlng;
  editId = null;

  document.getElementById("form-title").innerText = "Новая метка";
  document.getElementById("marker-title").value = "";
  document.getElementById("marker-desc").value = "";

  document.getElementById("marker-form").style.display = "block";
});

function deleteMarker(id) {
  var confirmDelete = confirm("Удалить метку?");
  if (!confirmDelete) return;

  // удаляем из массива
  savedMarkers = savedMarkers.filter(m => m.id !== id);
  localStorage.setItem("markers", JSON.stringify(savedMarkers));

  // удаляем с карты БЕЗ перезагрузки
  map.eachLayer(function(layer) {
    if (layer instanceof L.Marker && layer._customId === id) {
      map.removeLayer(layer);
    }
  });
}

function editMarker(id) {
  var marker = savedMarkers.find(m => m.id === id);
  if (!marker) return;

  editId = id;
  currentLatLng = { lat: marker.lat, lng: marker.lng };

  document.getElementById("form-title").innerText = "Редактирование";
  document.getElementById("marker-title").value = marker.title;
  document.getElementById("marker-desc").value = marker.description;

  document.getElementById("marker-form").style.display = "block";
}

function closeForm() {
  document.getElementById("marker-form").style.display = "none";
}

function saveMarker() {
  var title = document.getElementById("marker-title").value;
  var desc = document.getElementById("marker-desc").value;

  if (!title) return;

  if (editId) {
    var marker = savedMarkers.find(m => m.id === editId);
    marker.title = title;
    marker.description = desc;

    // обновляем popup БЕЗ reload
    map.eachLayer(function(layer) {
      if (layer instanceof L.Marker && layer._customId === editId) {
        layer.setPopupContent(`
          <div class="marker-popup">
            <div class="marker-title">${title}</div>
            <div class="marker-desc">${desc}</div>

            <div class="marker-buttons">
              <button onclick="editMarker(${editId})">✏️</button>
              <button onclick="deleteMarker(${editId})">🗑</button>
            </div>
          </div>
        `);
      }
    });

  } else {
    var newMarker = {
      lat: currentLatLng.lat,
      lng: currentLatLng.lng,
      title: title,
      description: desc,
      id: Date.now()
    };

    savedMarkers.push(newMarker);
    addMarker(newMarker);
  }

  localStorage.setItem("markers", JSON.stringify(savedMarkers));
  closeForm();
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    map.closePopup();
    closeForm(); // если форма открыта
  }
});

</script>

</body>
</html>
